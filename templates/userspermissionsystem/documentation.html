{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | Users Permission System</title>
  <link rel="stylesheet" href="{% static 'userspermissionsystem/css/dashboard.css' %}">
</head>
<body class="ups-docs">
  <header class="ups-docs-header">
    <a href="{% url 'userspermissionsystem:ai_dashboard' %}" class="ups-back">← Dashboard</a>
    <h1>Documentation</h1>
  </header>

  <div class="ups-docs-layout">
    <nav class="ups-docs-nav">
      {% for name in doc_nav %}
        <a href="?page={{ name }}" class="{% if name == doc_name %}is-active{% endif %}">{{ name|title }}</a>
      {% endfor %}
    </nav>

    <article class="ups-docs-content">
      {% if doc_name == 'architecture' %}
        <img src="{% static 'userspermissionsystem/images/architecture-diagram.png' %}" alt="Architecture" class="ups-docs-image">
      {% endif %}
      {% if doc_name == 'platforms' %}
        <img src="{% static 'userspermissionsystem/images/platform-icons.png' %}" alt="Platforms" class="ups-docs-image ups-docs-image--compact">
      {% endif %}
      <pre class="ups-markdown">{{ doc_content }}</pre>
    </article>
  </div>
</body>
</html>
